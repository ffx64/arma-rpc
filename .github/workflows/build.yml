name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Cache vcpkg
        id: vcpkg-cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/vcpkg
            ${{ github.workspace }}/vcpkg_installed
          key: vcpkg-x64-windows-${{ hashFiles('vcpkg.json') }}

      - name: Bootstrap vcpkg
        if: steps.vcpkg-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg.git vcpkg
          .\vcpkg\bootstrap-vcpkg.bat -disableMetrics

      - name: Install dependencies
        if: steps.vcpkg-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: .\vcpkg\vcpkg.exe install --triplet x64-windows

      - name: Build (Release)
        shell: pwsh
        run: |
          msbuild reforger-rpc.sln `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /p:VcpkgEnableManifest=true `
            /p:VcpkgRoot="${{ github.workspace }}\vcpkg" `
            /m

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: reforger-rpc-x64
          path: x64/Release/reforger-rpc.exe
          if-no-files-found: error
